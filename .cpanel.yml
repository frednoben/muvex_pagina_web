---
deployment:
  tasks:
    - export DEPLOYPATH=/home/muvexsac/public_html/
    - rm -rf $DEPLOYPATH/css $DEPLOYPATH/font $DEPLOYPATH/Gallery-js $DEPLOYPATH/GalleryCss $DEPLOYPATH/js $DEPLOYPATH/owl-carousel $DEPLOYPATH/img $DEPLOYPATH/presupuestos $DEPLOYPATH/slide-3categ $DEPLOYPATH/web_10
    - rm -f $DEPLOYPATH/contacto.php
    - rm -rf $DEPLOYPATH/images
    - cp index.html $DEPLOYPATH/index.html
    - cp -r images $DEPLOYPATH/
    - cp .htaccess $DEPLOYPATH/.htaccess
    - cp sitemap.xml $DEPLOYPATH/sitemap.xml
    - find $DEPLOYPATH -name '.DS_Store' -type f -delete
