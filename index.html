<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MUVEX S.A. - Sistema Integral (ERP)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAa7tWjX0qDLAtSeFrOOjml_SiXI40HIFI",
      authDomain: "muvex-sistema.firebaseapp.com",
      projectId: "muvex-sistema",
      storageBucket: "muvex-sistema.firebasestorage.app",
      messagingSenderId: "128758769784",
      appId: "1:128758769784:web:4df06ff152c0aedeac258d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const adminEmail = "frednoben@gmail.com";

    window.firebaseServices = {
      auth, db, adminEmail,
      provider: new GoogleAuthProvider(),
      signInWithPopup, signOut, onAuthStateChanged,
      collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDocs
    };
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;
    const {
      auth, db, adminEmail, provider,
      signInWithPopup, signOut, onAuthStateChanged,
      collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDocs
    } = window.firebaseServices;

    // ─────────────────────────────────────────────────────────
    // PANTALLA DE LOGIN
    // ─────────────────────────────────────────────────────────
    function LoginScreen() {
      return (
        <div className="h-screen flex flex-col items-center justify-center bg-slate-900">
          <div className="bg-orange-600 text-white font-extrabold text-4xl px-5 py-3 rounded-2xl shadow-2xl mb-6">M</div>
          <h1 className="text-3xl font-black text-white mb-1">MUVEX S.A.</h1>
          <p className="text-orange-400 text-sm font-bold uppercase tracking-widest mb-10">Sistema Integral ERP</p>
          <button
            onClick={() => signInWithPopup(auth, provider)}
            className="bg-white text-slate-900 px-8 py-4 rounded-xl font-black text-sm shadow-xl hover:bg-slate-100 transition-all flex items-center gap-3"
          >
            <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Ingresar con Google
          </button>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────
    // PANTALLA ACCESO DENEGADO
    // ─────────────────────────────────────────────────────────
    function AccessDenied({ user }) {
      return (
        <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-center px-6">
          <div className="text-5xl mb-4">🚫</div>
          <h1 className="text-2xl font-black text-white mb-2">Acceso Denegado</h1>
          <p className="text-slate-400 text-sm mb-1">Tu cuenta <span className="text-orange-400 font-bold">{user?.email}</span> no está autorizada.</p>
          <p className="text-slate-500 text-xs mb-8">Contactá al administrador del sistema para solicitar acceso.</p>
          <button onClick={() => signOut(auth)} className="bg-red-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 transition-all">
            Cerrar Sesión
          </button>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────
    // APP PRINCIPAL
    // ─────────────────────────────────────────────────────────
    function App() {
      const [authState, setAuthState] = useState('loading'); // loading | login | denied | authorized
      const [user, setUser] = useState(null);

      // Datos ERP
      const [jobs, setJobs] = useState([]);
      const [staff, setStaff] = useState([]);
      const [presupuestos, setPresupuestos] = useState([]);
      const [usuarios, setUsuarios] = useState([]);

      // UI
      const [activeTab, setActiveTab] = useState('presupuestos');
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [isJobModalOpen, setIsJobModalOpen] = useState(false);
      const [currentJob, setCurrentJob] = useState(null);
      const [expandedYears, setExpandedYears] = useState({});
      const [expandedMonths, setExpandedMonths] = useState({});
      const [currentCalendarDate, setCurrentCalendarDate] = useState(new Date());

      // Formularios
      const emptyJobForm = { sku:'', cliente:'', ruc:'', tipoTrabajo:'Standard', telefono:'', origen:'', destinos:[''], startDate: new Date().toISOString().split('T')[0], endDate: new Date().toISOString().split('T')[0], formaPago:'Transferencia', presupuesto:'', anticipo:'', factura:'', m3:'', encargadoCi:'', cuadrillaCis:[], estado:'No realizado' };
      const [jobForm, setJobForm] = useState(emptyJobForm);
      const [staffForm, setStaffForm] = useState({ ci: '', nombre: '' });
      const [newUser, setNewUser] = useState({ email: '', name: '' });

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      // ── AUTH ──────────────────────────────────────────────
      useEffect(() => {
        const unsub = onAuthStateChanged(auth, async (u) => {
          if (!u) { setAuthState('login'); setUser(null); return; }
          setUser(u);
          if (u.email === adminEmail) {
            setAuthState('authorized');
          } else {
            const snap = await getDocs(collection(db, "usuarios_autorizados"));
            const ok = snap.docs.some(d => d.id === u.email);
            setAuthState(ok ? 'authorized' : 'denied');
          }
        });
        return () => unsub();
      }, []);

      // ── LISTENERS FIRESTORE ───────────────────────────────
      useEffect(() => {
        if (authState !== 'authorized') return;
        setLoading(true);

        const unsubJobs = onSnapshot(collection(db, 'jobs'), snap => {
          setJobs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          setLoading(false);
        }, err => { console.error(err); showToast("Error al cargar mudanzas.", "error"); setLoading(false); });

        const unsubStaff = onSnapshot(collection(db, 'staff'), snap => {
          setStaff(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, err => console.error(err));

        const unsubPres = onSnapshot(collection(db, 'presupuestos'), snap => {
          setPresupuestos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, err => console.error(err));

        const unsubUsers = onSnapshot(collection(db, 'usuarios_autorizados'), snap => {
          setUsuarios(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, err => console.error(err));

        return () => { unsubJobs(); unsubStaff(); unsubPres(); unsubUsers(); };
      }, [authState]);

      // Auto-expandir año/mes actual
      useEffect(() => {
        if (presupuestos.length > 0) {
          const currentYear = new Date().getFullYear().toString();
          const mesesNombres = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
          const currentMonthName = mesesNombres[new Date().getMonth()];
          setExpandedYears(prev => Object.keys(prev).length === 0 ? { [currentYear]: true } : prev);
          setExpandedMonths(prev => Object.keys(prev).length === 0 ? { [`${currentYear}-${currentMonthName}`]: true } : prev);
        }
      }, [presupuestos]);

      // ── HELPERS ───────────────────────────────────────────
      const formatCurrency = (val) => val ? 'Gs. ' + Math.round(val).toLocaleString('es-PY') : 'Gs. 0';
      const getStaffName = (ci) => staff.find(s => s.ci === ci)?.nombre || 'Sin asignar';
      const getTipoColor = (tipo) => {
        const colors = { 'Integral': 'bg-blue-50 text-blue-700 border-blue-200', 'Standard': 'bg-orange-50 text-orange-700 border-orange-200', 'Flete': 'bg-emerald-50 text-emerald-700 border-emerald-200', 'Llave en mano': 'bg-purple-50 text-purple-700 border-purple-200' };
        return colors[tipo] || 'bg-gray-50 text-gray-700 border-gray-200';
      };
      const formatCronograma = (start, end) => {
        if (!start) return '-';
        const months = ['ene.','feb.','mar.','abr.','may.','jun.','jul.','ago.','sep.','oct.','nov.','dic.'];
        const sDate = new Date(start + 'T00:00:00');
        if (!end || start === end) return `${sDate.getDate()} ${months[sDate.getMonth()]}`;
        const eDate = new Date(end + 'T00:00:00');
        if (sDate.getMonth() === eDate.getMonth()) return `${sDate.getDate()} - ${eDate.getDate()} ${months[sDate.getMonth()]}`;
        return `${sDate.getDate()} ${months[sDate.getMonth()]} - ${eDate.getDate()} ${months[eDate.getMonth()]}`;
      };
      const toggleYear = (year) => setExpandedYears(p => ({ ...p, [year]: !p[year] }));
      const toggleMonth = (year, month) => setExpandedMonths(p => ({ ...p, [`${year}-${month}`]: !p[`${year}-${month}`] }));

      // ── PRESUPUESTOS AGRUPADOS ────────────────────────────
      const presupuestosAgrupados = useMemo(() => {
        const grupos = {};
        const mesesNombres = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
        presupuestos.forEach(p => {
          const date = new Date(p.fecha || p.creadoEn || new Date());
          const year = date.getFullYear();
          const month = mesesNombres[date.getMonth()];
          const monthIndex = date.getMonth();
          if (!grupos[year]) grupos[year] = {};
          if (!grupos[year][month]) grupos[year][month] = { index: monthIndex, items: [] };
          grupos[year][month].items.push(p);
        });
        Object.keys(grupos).forEach(year => {
          Object.keys(grupos[year]).forEach(month => {
            grupos[year][month].items.sort((a, b) => parseInt(b.nro || 0) - parseInt(a.nro || 0));
          });
        });
        return grupos;
      }, [presupuestos]);

      // ── TOTALES ───────────────────────────────────────────
      const pendingJobs = useMemo(() => jobs.filter(j => j.estado === 'No realizado'), [jobs]);
      const completedJobs = useMemo(() => jobs.filter(j => j.estado === 'Realizado'), [jobs]);
      const calcTot = (gr) => gr.reduce((acc, c) => ({ p: acc.p + (c.presupuesto||0), a: acc.a + (c.anticipo||0), s: acc.s + ((c.presupuesto||0)-(c.anticipo||0)) }), { p:0, a:0, s:0 });
      const pendingTotals = useMemo(() => calcTot(pendingJobs), [pendingJobs]);
      const completedTotals = useMemo(() => calcTot(completedJobs), [completedJobs]);

      // ── APROBAR Y AGENDAR ────────────────────────────────
      const handleAprobarYAgendar = async (presupuesto) => {
        try {
          await updateDoc(doc(db, 'presupuestos', presupuesto.id), { estado: 'Aprobado' });
        } catch (err) { showToast("Error al aprobar el presupuesto.", "error"); return; }
        setJobForm({
          sku: presupuesto.nro || presupuesto.id || '',
          cliente: presupuesto.cliente || '',
          ruc: presupuesto.ruc || '',
          tipoTrabajo: presupuesto.tipo || 'Standard',
          telefono: presupuesto.telefono || '',
          origen: presupuesto.origen || '',
          destinos: presupuesto.destino ? [presupuesto.destino] : [''],
          startDate: new Date().toISOString().split('T')[0],
          endDate: new Date().toISOString().split('T')[0],
          formaPago: 'Transferencia',
          presupuesto: presupuesto.montoTotal || presupuesto.monto || '',
          anticipo: '', factura: '', m3: presupuesto.m3 || '',
          encargadoCi: '', cuadrillaCis: [], estado: 'No realizado'
        });
        setCurrentJob(null);
        setIsJobModalOpen(true);
        showToast(`Presupuesto Nº ${presupuesto.nro} importado. Asigná el equipo.`, 'success');
      };

      // ── JOBS CRUD ─────────────────────────────────────────
      const handleJobFormChange = (e) => setJobForm(p => ({ ...p, [e.target.name]: e.target.value }));
      const openNewJobModal = () => { setCurrentJob(null); setJobForm(emptyJobForm); setIsJobModalOpen(true); };
      const openEditJobModal = (job) => { setCurrentJob(job); setJobForm({ ...job, destinos: job.destinos?.length ? [...job.destinos] : [''] }); setIsJobModalOpen(true); };
      const addDestinoField = () => setJobForm(p => ({ ...p, destinos: [...p.destinos, ''] }));
      const handleDestinoChange = (idx, val) => { const nd = [...jobForm.destinos]; nd[idx] = val; setJobForm(p => ({...p, destinos: nd})); };
      const removeDestinoField = (idx) => setJobForm(p => ({...p, destinos: p.destinos.filter((_,i) => i !== idx)}));
      const handleCuadrillaToggle = (ci) => setJobForm(p => ({ ...p, cuadrillaCis: p.cuadrillaCis.includes(ci) ? p.cuadrillaCis.filter(i => i !== ci) : [...p.cuadrillaCis, ci] }));

      const handleSaveJob = async (e) => {
        e.preventDefault();
        const payload = { ...jobForm, presupuesto: parseFloat(jobForm.presupuesto)||0, anticipo: parseFloat(jobForm.anticipo)||0, m3: parseFloat(jobForm.m3)||0, destinos: jobForm.destinos.filter(d => d.trim() !== '') };
        try {
          await setDoc(doc(db, 'jobs', payload.sku), payload);
          setIsJobModalOpen(false);
          showToast("Mudanza guardada en la nube ✓");
          setActiveTab('tabla');
        } catch(err) { showToast("Error al guardar el agendamiento.", "error"); }
      };

      const toggleJobStatus = async (job) => {
        const nextStatus = job.estado === 'Realizado' ? 'No realizado' : 'Realizado';
        try {
          await updateDoc(doc(db, 'jobs', job.sku || job.id), { estado: nextStatus });
        } catch(err) { showToast("Error al actualizar estado.", "error"); }
      };

      const handleDeleteJob = async (sku) => {
        if (!window.confirm(`¿Eliminar el agendamiento Nº ${sku}?`)) return;
        try {
          await deleteDoc(doc(db, 'jobs', sku));
          setIsJobModalOpen(false);
          showToast("Registro eliminado.");
        } catch(e) { showToast("No se pudo eliminar.", "error"); }
      };

      // ── STAFF CRUD ────────────────────────────────────────
      const handleSaveStaff = async (e) => {
        e.preventDefault();
        try {
          await setDoc(doc(db, 'staff', staffForm.ci), staffForm);
          setStaffForm({ ci: '', nombre: '' });
          showToast(`${staffForm.nombre} registrado ✓`);
        } catch(err) { showToast("Error al registrar colaborador.", "error"); }
      };

      const handleDeleteStaff = async (ci, nombre) => {
        if (!window.confirm(`¿Dar de baja a ${nombre}?`)) return;
        try {
          await deleteDoc(doc(db, 'staff', ci));
          showToast(`${nombre} dado de baja.`);
        } catch(err) { showToast("Error al eliminar.", "error"); }
      };

      // ── USUARIOS AUTORIZADOS ──────────────────────────────
      const handleAddUser = async () => {
        if (!newUser.email || !newUser.name) return;
        try {
          await setDoc(doc(db, 'usuarios_autorizados', newUser.email), { name: newUser.name, email: newUser.email, fecha: new Date().toLocaleDateString('es-PY') });
          setNewUser({ email: '', name: '' });
          showToast("Usuario autorizado ✓");
        } catch(err) { showToast("Error al agregar usuario.", "error"); }
      };

      const handleRemoveUser = async (email) => {
        if (!window.confirm(`¿Revocar acceso de ${email}?`)) return;
        try {
          await deleteDoc(doc(db, 'usuarios_autorizados', email));
          showToast("Acceso revocado.");
        } catch(err) { showToast("Error al eliminar usuario.", "error"); }
      };

      // ── WHATSAPP ──────────────────────────────────────────
      const sendWhatsApp = (job) => {
        const cleanPhone = job.telefono ? job.telefono.replace(/\D/g, '') : '';
        const crewNames = job.cuadrillaCis?.map(ci => getStaffName(ci)).join(', ') || 'Sin equipo';
        const destinosList = job.destinos?.map((d, i) => `📍 *Destino ${i+1}:* ${d}`).join('\n') || 'No especificado';
        const message = `🚚 *MUVEX S.A. - LOGÍSTICA DE MUDANZAS* 🚚\n\n` +
          `*Nº Presupuesto SKU:* ${job.sku}\n*Cliente:* ${job.cliente}\n*Tipo de Servicio:* ${job.tipoTrabajo}\n` +
          `*Fecha de Inicio:* ${formatCronograma(job.startDate, job.endDate)}\n*Volumen M³:* ${job.m3 || 0} M³\n\n` +
          `👤 *Encargado:* ${getStaffName(job.encargadoCi)}\n👥 *Cuadrilla:* ${crewNames}\n\n` +
          `📍 *Origen:* ${job.origen || 'No especificado'}\n${destinosList}\n\n` +
          `💰 *Presupuesto:* ${formatCurrency(job.presupuesto)}\n💰 *Anticipo:* ${formatCurrency(job.anticipo)}\n` +
          `💳 *Saldo a cobrar:* ${formatCurrency(job.presupuesto - job.anticipo)}\n` +
          `📄 *Nº Factura:* ${job.factura || 'No emitida'}\n💵 *Forma de pago:* ${job.formaPago}\n\n` +
          `🚀 _¡Buen viaje equipo! Moviendo tu mundo con total confianza._`;
        const encoded = encodeURIComponent(message);
        window.open(`https://api.whatsapp.com/send?phone=${cleanPhone.startsWith('0') ? '595' + cleanPhone.substring(1) : cleanPhone}&text=${encoded}`, '_blank');
      };

      // ── CALENDARIO ────────────────────────────────────────
      const renderCalendar = () => {
        const year = currentCalendarDate.getFullYear();
        const month = currentCalendarDate.getMonth();
        const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const daysArray = [];
        for (let i = 0; i < firstDayIndex; i++) daysArray.push(null);
        for (let d = 1; d <= totalDays; d++) daysArray.push(new Date(year, month, d));

        return (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <div className="flex flex-wrap justify-between items-center mb-6 gap-4">
              <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                📅 Agenda Mensual — <span className="text-orange-600 font-black">{monthNames[month]} {year}</span>
              </h2>
              <div className="flex gap-2">
                <button onClick={() => setCurrentCalendarDate(new Date(year, month - 1, 1))} className="px-3 py-1.5 border hover:bg-slate-50 rounded-lg text-xs font-bold transition-all">← Anterior</button>
                <button onClick={() => setCurrentCalendarDate(new Date())} className="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg text-xs font-bold transition-all">Hoy</button>
                <button onClick={() => setCurrentCalendarDate(new Date(year, month + 1, 1))} className="px-3 py-1.5 border hover:bg-slate-50 rounded-lg text-xs font-bold transition-all">Siguiente →</button>
              </div>
            </div>
            <div className="grid grid-cols-7 gap-2 mb-2 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">
              <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
            </div>
            <div className="grid grid-cols-7 gap-2">
              {daysArray.map((day, idx) => {
                if (!day) return <div key={`empty-${idx}`} className="h-28 bg-slate-50/50 rounded-xl"></div>;
                const dateStr = day.toISOString().split('T')[0];
                const dayJobs = jobs.filter(j => {
                  if (!j.startDate) return false;
                  const start = new Date(j.startDate + 'T00:00:00');
                  const end = new Date((j.endDate || j.startDate) + 'T00:00:00');
                  const curr = new Date(dateStr + 'T00:00:00');
                  return curr >= start && curr <= end;
                });
                return (
                  <div key={idx} className="h-28 p-1.5 border border-slate-200 rounded-xl flex flex-col justify-between bg-white hover:shadow-sm transition-shadow">
                    <span className="text-xs font-black text-slate-700">{day.getDate()}</span>
                    <div className="flex-1 overflow-y-auto space-y-1 mt-1 scrollbar-thin">
                      {dayJobs.map(job => {
                        const colors = getTipoColor(job.tipoTrabajo);
                        return (
                          <div key={job.sku} onClick={() => openEditJobModal(job)} className={`text-[9px] px-1 py-0.5 rounded border font-semibold truncate cursor-pointer transition-transform hover:scale-95 ${colors}`} title={`Nº ${job.sku} - ${job.cliente}`}>
                            #{job.sku} {job.cliente}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      // ── RENDER STATES ─────────────────────────────────────
      if (authState === 'loading') return (
        <div className="h-screen flex items-center justify-center bg-slate-900">
          <div className="text-white text-center">
            <div className="bg-orange-600 text-white font-extrabold text-4xl px-5 py-3 rounded-2xl shadow-2xl mb-4 inline-block">M</div>
            <p className="text-slate-400 text-sm mt-4 animate-pulse">Verificando acceso...</p>
          </div>
        </div>
      );
      if (authState === 'login') return <LoginScreen />;
      if (authState === 'denied') return <AccessDenied user={user} />;

      // ── MAIN APP ──────────────────────────────────────────
      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col">

                </div>
              </div>
            )}

          </main>

          {/* ══════════════════════════════════════════
              MODAL: AGENDAMIENTO DE MUDANZA
          ══════════════════════════════════════════ */}
          {isJobModalOpen && (
            <div className="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto border">
                <div className="bg-slate-900 text-white px-6 py-4 flex justify-between items-center rounded-t-2xl sticky top-0 z-10">
                  <h3 className="text-sm font-black uppercase tracking-widest">{currentJob ? `Editar Mudanza Nº ${currentJob.sku}` : 'Cargar Agendamiento'}</h3>
                  <button onClick={() => setIsJobModalOpen(false)} className="text-xl font-bold hover:text-red-400">✕</button>
                </div>

                <form onSubmit={handleSaveJob} className="p-6 space-y-6 text-xs">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">Presupuesto SKU *</label>
                      <input type="text" name="sku" required disabled={!!currentJob} value={jobForm.sku} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl disabled:bg-slate-100 disabled:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">Cliente *</label>
                      <input type="text" name="cliente" required value={jobForm.cliente} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">RUC</label>
                      <input type="text" name="ruc" value={jobForm.ruc} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">Tipo de Mudanza</label>
                      <select name="tipoTrabajo" value={jobForm.tipoTrabajo} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Integral">🔵 Integral</option>
                        <option value="Standard">Standard</option>
                        <option value="Flete">Flete</option>
                        <option value="Llave en mano">Llave en mano</option>
                      </select>
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">Teléfono WhatsApp</label>
                      <input type="text" name="telefono" value={jobForm.telefono} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">M³ Volumen</label>
                      <input type="number" step="0.1" name="m3" value={jobForm.m3} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">Fecha de Inicio</label>
                      <input type="date" name="startDate" value={jobForm.startDate} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">Fecha de Fin</label>
                      <input type="date" name="endDate" value={jobForm.endDate} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  </div>

                  <div className="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div>
                      <label className="block font-bold text-slate-500 uppercase mb-1">Origen Google Maps</label>
                      <input type="url" name="origen" value={jobForm.origen} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://maps.app.goo.gl/..." />
                    </div>
                    <div>
                      <div className="flex justify-between items-center mb-1">
                        <label className="font-bold text-slate-500 uppercase">Destino(s) Google Maps</label>
                        <button type="button" onClick={addDestinoField} className="text-blue-600 hover:underline font-bold text-xs">＋ Agregar destino</button>
                      </div>
                      {jobForm.destinos.map((dest, i) => (
                        <div key={i} className="flex gap-2 mb-2 items-center">
                          <span className="font-bold text-slate-400">D{i+1}</span>
                          <input type="url" value={dest} onChange={(e) => handleDestinoChange(i, e.target.value)} className="flex-1 border px-3 py-2.5 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://maps.app.goo.gl/..." />
                          {jobForm.destinos.length > 1 && (
                            <button type="button" onClick={() => removeDestinoField(i)} className="text-red-500 font-bold bg-red-50 px-2 py-2 rounded-xl hover:bg-red-100">✕</button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-orange-50/10 p-4 rounded-xl border border-orange-100">
                    <div>
                      <label className="block font-bold text-slate-600 mb-2">👑 Encargado (Líder)</label>
                      <select name="encargadoCi" value={jobForm.encargadoCi} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">-- Seleccionar Líder --</option>
                        {staff.map(s => <option key={s.ci} value={s.ci}>{s.nombre} (CI: {s.ci})</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block font-bold text-slate-600 mb-2">👥 Miembros de la Cuadrilla</label>
                      <div className="max-h-28 overflow-y-auto border rounded-xl bg-white p-2 space-y-1.5 scrollbar-thin">
                        {staff.map(s => (
                          <label key={s.ci} className="flex items-center gap-2 cursor-pointer p-1 rounded hover:bg-slate-50">
                            <input type="checkbox" checked={jobForm.cuadrillaCis.includes(s.ci)} onChange={() => handleCuadrillaToggle(s.ci)} className="rounded" />
                            <span>{s.nombre} (CI: {s.ci})</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                      <label className="block font-bold text-slate-500 mb-1">Monto Presupuesto (Gs)</label>
                      <input type="number" name="presupuesto" value={jobForm.presupuesto} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 mb-1">Monto Anticipo (Gs)</label>
                      <input type="number" name="anticipo" value={jobForm.anticipo} onChange={handleJobFormChange} className="w-full border px-3 py-2.5 rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div className="bg-orange-50 p-2 rounded-xl text-center border border-orange-100 flex flex-col justify-center">
                      <span className="text-[10px] font-bold text-orange-800 uppercase">Saldo Pendiente</span>
                      <span className="text-base font-black text-orange-600">{formatCurrency((parseFloat(jobForm.presupuesto)||0) - (parseFloat(jobForm.anticipo)||0))}</span>
                    </div>
                  </div>

                  <div>
                    <label className="block font-bold text-slate-500 uppercase mb-1">Nº de Factura</label>
                    <input type="text" name="factura" value={jobForm.factura} onChange={handleJobFormChange} placeholder="Ej: 001-001-0002026" className="w-full border px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  </div>

                  <div className="flex justify-between items-center pt-4 border-t">
                    {currentJob && (
                      <button type="button" onClick={() => handleDeleteJob(currentJob.sku)} className="bg-red-50 hover:bg-red-100 text-red-700 font-bold px-4 py-2.5 rounded-xl transition-all">Eliminar 🗑️</button>
                    )}
                    <div className="flex gap-2 ml-auto">
                      <button type="button" onClick={() => setIsJobModalOpen(false)} className="px-4 py-2.5 border rounded-xl font-bold text-slate-500 hover:bg-slate-50">Cancelar</button>
                      <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold shadow-md transition-all">Guardar Agendamiento</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          )}

          <footer className="bg-slate-900 text-slate-400 py-6 px-6 text-center text-[10px] mt-12 border-t border-slate-800">
            <p>© 2026 Muvex S.A. Todos los derechos reservados.</p>
            <p className="mt-1 text-slate-500">Sistema desarrollado a medida · Firebase Hosting</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
